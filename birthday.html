<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday ❤️‍🔥</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #000000, #1a0000);
      color: white;
      overflow: hidden;
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 55px;
      color: #ff1a1a;
      margin-top: 80px;
      text-shadow: 0 0 15px #ff1a1a;
    }

    p {
      font-size: 18px;
      padding: 0 20px;
      color: #ddd;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 16px;
      background: #ff1a1a;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 0 15px #ff1a1a;
      transition: 0.3s;
    }

    button:hover {
      background: black;
      border: 1px solid #ff1a1a;
      transform: scale(1.1);
    }

    /* hearts */
    .heart {
      position: absolute;
      color: #ff1a1a;
      font-size: 18px;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<h1>Happy Birthday My Love ❤️‍🔥</h1>

<p>
You are my dark paradise 🖤🔥<br>
My love for you burns forever ❤️‍🔥
</p>

<a href="https://drive.google.com/file/d/18mAIM3iE9uvWBjHukhcA0_Fz1ABm6GBR/view?usp=sharing" target="_blank">
  <button>Watch Our Video 🎥</button>
</a>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 15 + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
