<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 💖</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #ffd6e0, #ffe6f0);
      overflow: hidden;
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 50px;
      color: #ff4d88;
      margin-top: 80px;
    }

    p {
      font-size: 20px;
      color: #333;
      padding: 0 20px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      background: #ff4d88;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff1a66;
      transform: scale(1.1);
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: #ff4d88;
      font-size: 20px;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<h1>Happy Birthday My Love 🎂❤️</h1>

<p>
  You are the most beautiful part of my life 💖  
  Every moment with you feels like a dream ✨  
  I’m so lucky to have you 🥺💕  
</p>

<a href="https://drive.google.com/file/d/18mAIM3iE9uvWBjHukhcA0_Fz1ABm6GBR/view?usp=sharing" target="_blank">
  <button>Watch Our Special Video 🎥💞</button>
</a>

<script>
  // Create floating hearts
  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 15 + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }

  setInterval(createHeart, 300);
</script>

</body>
</html>
