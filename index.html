<!DOCTYPE html>
<html>
<head>
  <title>Secret Surprise 💖</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #ffd6e0, #ffe6f0);
      overflow: hidden;
    }

    .box {
      background: rgba(255, 255, 255, 0.7);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      backdrop-filter: blur(5px);
    }

    h2 {
      font-family: 'Dancing Script', cursive;
      font-size: 40px;
      color: #ff4d88;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      width: 200px;
      border: 2px solid #ffb3c6;
      border-radius: 10px;
      outline: none;
      text-align: center;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #ff4d88;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff1a66;
      transform: scale(1.1);
    }

    p {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
    }

    /* floating hearts */
    .heart {
      position: absolute;
      color: #ff4d88;
      font-size: 18px;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Enter the Secret 💖</h2>

  <input type="password" id="pass" placeholder="Password">

  <br>

  <button onclick="checkPass()">Unlock 💌</button>

  <p>Only special person can enter this surprise ✨</p>
</div>

<script>
function checkPass() {
  var password = document.getElementById("pass").value;

  if(password === "0910") {
    window.location.href = "birthday.html";
  } else {
    alert("Wrong password 😢 Try again");
  }
}

/* floating hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 15 + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>
