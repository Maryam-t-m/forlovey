<!DOCTYPE html>
<html>
<head>
  <title>Secret Access ❤️📜</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f7f3ea, #ffffff);
      overflow: hidden;
      text-align: center;
      color: #3a3a3a;
    }

    .box {
      padding: 50px;
      border-radius: 20px;
      background: rgba(255,255,255,0.7);
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
      backdrop-filter: blur(10px);
      animation: fadeIn 1.5s ease;
    }

    h2 {
      font-family: 'Dancing Script', cursive;
      font-size: 45px;
      color: #8b6f47;
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      width: 220px;
      border: 1px solid #c2a87d;
      border-radius: 10px;
      text-align: center;
      outline: none;
    }

    button {
      margin-top: 15px;
      padding: 10px 25px;
      border: none;
      border-radius: 25px;
      background: #8b6f47;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #6f5638;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* soft floating hearts */
    .heart {
      position: absolute;
      color: #c2a87d;
      animation: float 6s linear infinite;
      opacity: 0.6;
    }

    @keyframes float {
      0% {transform: translateY(100vh); opacity: 1;}
      100% {transform: translateY(-10vh); opacity: 0;}
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Enter the Secret ❤️📜</h2>

  <input type="password" id="pass" placeholder="Password">

  <br>

  <button onclick="checkPass()">Unlock ✨</button>
 <p> Only special person can enter... ✨</p> 
</div>

<script>
function checkPass() {
  let pass = document.getElementById("pass").value;
  if(pass === "0910") {
    document.body.style.opacity = "0";
    setTimeout(() => {
      window.location.href = "birthday.html";
    }, 600);
  } else {
    alert("Wrong password 🤍");
  }
}

// hearts
setInterval(() => {
  const h = document.createElement("div");
  h.classList.add("heart");
  h.innerHTML = "🤍";
  h.style.left = Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},400);
</script>

</body>
</html>
